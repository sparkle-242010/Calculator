<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        
        <input type="text" placeholder="0" readonly>
        <div class="number-operator">
            <button id="delete"  ><i class="fa-solid fa-delete-left"></i></button>
            <button id="AC" >AC</button>
            <button id="divide" class="orange">/</button>

            <button id="seven">7</button>
            <button id="eight">8</button>
            <button id="nine">9</button>
            <button id="mul" class="orange">*</i></button>

            <button id="four">4</button>
            <button id="five">5</button>
            <button id="six">6</button>
            <button id="sub" class="orange">-</button>

            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button id="add" class="orange">+</button>

            <button id="zero">0</button>
            <button id="dec">.</button>
            <button id="eq" class="orange">=</button>
            
           
            
         
            
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
